# ░█▀▀░█▀█░█░█
# ░█▀▀░█░█░▀▄▀
# ░▀▀▀░▀░▀░░▀░

# User preferences
env = EDITOR,nvim
env = VISUAL,nvim
env = PAGER,bat
env = MANPAGER,bat
env = BROWSER,firefox
env = TERMINAL,kitty

# Hyprland specific
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = GDK_BACKEND,wayland
env = QT_QPA_PLATFORM,wayland
env = QT_STYLE_OVERRIDE,kvantum
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1

# Directories and paths
env = PATH,$HOME/.local/bin/:$PATH
## Workaround for reusing the env variable in this config file
$XDG_CONFIG_HOME = $HOME/.config
$XDG_CACHE_HOME = $HOME/.cache
$XDG_DATA_HOME = $HOME/.local/share
$XDG_STATE_HOME = $HOME/.local/state
env = XDG_CONFIG_HOME,$HOME/.config
env = XDG_CACHE_HOME,$HOME/.cache
env = XDG_DATA_HOME,$HOME/.local/share/
env = XDG_STATE_HOME,$HOME/.local/state/
env = XDG_PICTURES_DIR,$HOME/Pictures

# XDG-Ninja recommendations
env = HISTFILE,$XDG_STATE_HOME/shell/history
env = CARGO_HOME,$XDG_DATA_HOME/cargo
env = CUDA_CACHE_PATH,$XDG_CACHE_HOME/cuda
env = GNUPGHOME,$XDG_DATA_HOME/gnupg
env = GTK2_RC_FILES,$XDG_CONFIG_HOME/gtk-2.0/gtkrc
env = IPYTHONDIR,$XDG_CONFIG_HOME/ipython
env = JUPYTER_CONFIG_DIR,$XDG_CONFIG_HOME/jupyter
env = PARALLEL_HOME,$XDG_CONFIG_HOME/parallel
env = RUSTUP_HOME,$XDG_DATA_HOME/rustup
env = WINEPREFIX,$XDG_DATA_HOME/wine
env = XINITRC,$XDG_CONFIG_HOME/X11/xinitrc
env = XAUTHORITY,$XDG_STATE_HOME/X11/xauthority
env = ZDOTDIR,$XDG_CONFIG_HOME/zsh

