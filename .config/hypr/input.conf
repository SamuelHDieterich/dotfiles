input {
  kb_layout = br,us
  kb_variant = abnt2,intl
  #kb_model = 
  kb_options = qrp:lalt_lshift_toggle
  #kb_rules = 
  follow_mouse = 1
  touchpad {
    natural_scroll = yes
  }
  sensitivity = 0
  force_no_accel = 0
}

gestures {
  workspace_swipe = true
  workspace_swipe_fingers = 3
}
